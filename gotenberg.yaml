services:


  gotenberg:
    image: gotenberg/gotenberg:latest

    networks:
      - swarm_public

    environment:
      - API_DISABLE_HEALTH_CHECK_LOGGING=${API_DISABLE_HEALTH_CHECK_LOGGING:-true}
      - API_BODY_LIMIT=${GOTENBERG_API_BODY_LIMIT:-250MB}
      - API_TIMEOUT=${GOTENBERG_API_TIMEOUT:-600s}
      - LIBREOFFICE_START_TIMEOUT=${GOTENBERG_LIBREOFFICE_START_TIMEOUT:-60s}
      - CHROMIUM_START_TIMEOUT=${GOTENBERG_CHROMIUM_START_TIMEOUT:-60s}
      # Opcional: desabilitar módulos para reduzir memória
      # - CHROMIUM_DISABLE_ROUTES=true
      # - LIBREOFFICE_DISABLE_ROUTES=true

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.role == worker
      resources:
        limits:
          cpus: "4"
          memory: 6144M
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
      labels:
        - traefik.enable=true
        - traefik.http.routers.gotenberg.rule=Host(`${GOTENBERG_DOMAIN}`)
        - traefik.http.routers.gotenberg.entrypoints=websecure
        - traefik.http.routers.gotenberg.priority=1
        - traefik.http.routers.gotenberg.tls.certresolver=letsencryptresolver
        - traefik.http.routers.gotenberg.service=gotenberg
        - traefik.http.services.gotenberg.loadbalancer.server.port=3000
        - traefik.http.services.gotenberg.loadbalancer.passHostHeader=1
        - traefik.http.middlewares.gotenberg-body-limit.buffering.maxRequestBodyBytes=262144000
        - traefik.http.middlewares.gotenberg-body-limit.buffering.maxResponseBodyBytes=262144000
        - traefik.http.middlewares.gotenberg-body-limit.buffering.memRequestBodyBytes=2097152
        - traefik.http.middlewares.gotenberg-body-limit.buffering.memResponseBodyBytes=2097152
        - traefik.http.routers.gotenberg.middlewares=gotenberg-body-limit@swarm,crowdsec-bouncer@swarm,security-headers@file,rate-limit@file

networks:
  swarm_public:
    external: true
    name: swarm_public
