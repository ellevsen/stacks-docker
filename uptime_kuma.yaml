services:

## --------------------------- UPTIME KUMA --------------------------- ##

  uptime_kuma:
    image: louislam/uptime-kuma:2

    networks:
      - swarm_public

    environment:
      - TZ=${TZ:-America/Sao_Paulo}

    volumes:
      - uptime_kuma_data:/app/data

    # Official image uses a Go binary for HEALTHCHECK; override uses Node (guaranteed in image).
    # No dedicated /health endpoint; GET root as per https://github.com/louislam/uptime-kuma/issues/4831
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
      labels:
        - traefik.enable=true
        - traefik.http.routers.uptime_kuma.rule=Host(`${UPTIME_KUMA_DOMAIN}`)
        - traefik.http.routers.uptime_kuma.entrypoints=websecure
        - traefik.http.routers.uptime_kuma.priority=1
        - traefik.http.routers.uptime_kuma.tls.certresolver=letsencryptresolver
        - traefik.http.routers.uptime_kuma.service=uptime_kuma
        - traefik.http.services.uptime_kuma.loadbalancer.server.port=3001
        - traefik.http.services.uptime_kuma.loadbalancer.passHostHeader=1
        - traefik.http.routers.uptime_kuma.middlewares=crowdsec-bouncer@swarm,security-headers@file,rate-limit@file

networks:
  swarm_public:
    external: true
    name: swarm_public

volumes:
  uptime_kuma_data:
